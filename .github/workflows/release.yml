name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.app

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild \
            -project local-whisper.xcodeproj \
            -resolvePackageDependencies

      - name: Build LocalWhisper.app (universal, ad-hoc signed)
        run: |
          set -euo pipefail
          xcodebuild \
            -project local-whisper.xcodeproj \
            -target local-whisper \
            -configuration Release \
            SYMROOT="$PWD/build" \
            OBJROOT="$PWD/build/Intermediates" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION=${{ steps.ver.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp=none" \
            build

      - name: Locate built app
        id: app
        run: |
          set -euo pipefail
          APP_PATH="$PWD/build/Release/LocalWhisper.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::LocalWhisper.app not found at $APP_PATH"
            find build -maxdepth 4 -name "*.app" -type d || true
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Re-sign deep ad-hoc
        run: |
          codesign --force --deep --sign - "${{ steps.app.outputs.path }}"
          codesign --verify --deep --strict --verbose=2 "${{ steps.app.outputs.path }}"

      - name: Create DMG
        id: dmg
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="LocalWhisper-${VERSION}.dmg"
          STAGING="$(mktemp -d)/dmg"
          mkdir -p "$STAGING"
          cp -R "${{ steps.app.outputs.path }}" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "LocalWhisper ${VERSION}" \
            -srcfolder "$STAGING" \
            -fs HFS+ \
            -format UDZO \
            -ov \
            "$DMG"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          SIZE=$(stat -f%z "$DMG")
          echo "name=$DMG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "DMG ${DMG} (${SIZE} bytes) sha256=${SHA}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          DMG="${{ steps.dmg.outputs.name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" "$DMG" \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Bump Homebrew cask in aarondpn/homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ steps.dmg.outputs.sha }}
        run: |
          set -euo pipefail
          TAP_DIR="$(mktemp -d)/tap"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/aarondpn/homebrew-tap.git" "$TAP_DIR"
          cd "$TAP_DIR"
          mkdir -p Casks
          cat > Casks/local-whisper.rb <<EOF
          # This file is auto-generated by the local-whisper release workflow. DO NOT EDIT.
          cask "local-whisper" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/aarondpn/local-whisper/releases/download/v#{version}/LocalWhisper-#{version}.dmg"
            name "LocalWhisper"
            desc "Menu-bar speech-to-text powered by Whisper"
            homepage "https://github.com/aarondpn/local-whisper"

            livecheck do
              skip "Auto-generated on release."
            end

            auto_updates false
            depends_on macos: :sequoia

            app "LocalWhisper.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/LocalWhisper.app"]
            end

            uninstall quit: "com.aarondpn.local-whisper"

            zap trash: [
              "~/Library/Application Support/LocalWhisper",
              "~/Library/Caches/com.aarondpn.local-whisper",
              "~/Library/Preferences/com.aarondpn.local-whisper.plist",
              "~/Library/Saved Application State/com.aarondpn.local-whisper.savedState",
            ]
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/local-whisper.rb
          if git diff --cached --quiet -- Casks/local-whisper.rb; then
            echo "No cask changes."
            exit 0
          fi
          git commit -m "local-whisper ${VERSION}"
          git push origin main
